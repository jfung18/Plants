// ── Pure integer day math ────────────────────────────────────────────────────
const DAYS_PER_MONTH = [0, 31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31];

function ymdToDay(y, m, d) {
  let n = (y - 2025) * 365 + Math.floor((y - 2025) / 4);
  for (let i = 1; i < m; i++) n += DAYS_PER_MONTH[i];
  if (m > 2 && y % 4 === 0) n++;
  return n + (d - 1);
}

function dayToYMD(n) {
  let y = 2025, m = 1;
  while (true) {
    const diy = y % 4 === 0 ? 366 : 365;
    if (n < diy) break;
    n -= diy; y++;
  }
  while (true) {
    const dim = m === 2 && y % 4 === 0 ? 29 : DAYS_PER_MONTH[m];
    if (n < dim) break;
    n -= dim; m++;
  }
  return { y, m, d: n + 1 };
}

function dayToWeekday(n) { return (n + 3) % 7; }

function isWaterDay(plant, n) {
  if (plant.dormant) return false;
  const base = plant.lastWatered != null ? plant.lastWatered : LAST_WATERED;
  const diff = n - base;
  return diff >= 0 && diff % plant.days === 0;
}

// Returns { wc: bool, bw: bool } for a given day and plant
function fertTypesOnDay(plant, n) {
  if (!plant.fertSchedule) return { wc: false, bw: false };
  const wcDay = nextWormCastings(plant);
  const out = { wc: false, bw: false };

  if (wcDay !== null) {
    // Check if this day matches worm casting schedule
    const interval = plant.fertSchedule.wc;
    if (interval === "spring") {
      // Only one day per year (April 15 baseline, or today if applied today)
      const wasTodayApplied = WC_APPLIED_TODAY.includes(plant.name);
      const baseDay = wasTodayApplied ? WORM_CASTINGS_TODAY : ymdToDay(dayToYMD(n).y, 4, 15);
      if (n === baseDay) out.wc = true;
      if (n === wcDay) out.wc = true;
    } else if (interval === "biannual") {
      const y = dayToYMD(n).y;
      const april = ymdToDay(y, 4, 15);
      const july = ymdToDay(y, 7, 15);
      const wasTodayApplied = WC_APPLIED_TODAY.includes(plant.name);
      if (wasTodayApplied && n === WORM_CASTINGS_TODAY) out.wc = true;
      if (n === april || n === july) out.wc = true;
      if (n === wcDay) out.wc = true;
    } else if (typeof interval === "number") {
      // Regular interval — mark every Nth day from baseline, within growing season
      const wasTodayApplied = WC_APPLIED_TODAY.includes(plant.name);
      const baseline = wasTodayApplied ? WORM_CASTINGS_TODAY : ymdToDay(2026, 4, 1);
      const diff = n - baseline;
      if (diff >= 0 && diff % interval === 0) {
        // Only during growing season (April–September)
        const m = dayToYMD(n).m;
        if (m >= 4 && m <= 9) out.wc = true;
      }
    }
  }

  // Banana water
  if (plant.fertSchedule.bw !== null) {
    const bwDay = nextBananaWater(plant);
    if (bwDay !== null) {
      const interval = plant.fertSchedule.bw;
      // Check if n matches intervals from bwDay going forward
      const diff = n - bwDay;
      if (diff >= 0 && diff % interval === 0) {
        out.bw = true;
      }
    }
  }

  return out;
}

function nextFertDay(plant) {
  if (!plant.fertSchedule) return null;
  const wc = nextWormCastings(plant);
  const bw = nextBananaWater(plant);
  if (wc === null && bw === null) return null;
  if (wc === null) return bw;
  if (bw === null) return wc;
  return Math.min(wc, bw);
}

function nextWater(plant) {
  if (plant.dormant) return null;
  const base = plant.lastWatered != null ? plant.lastWatered : LAST_WATERED;
  const diff = TODAY - base;
  const cycles = Math.floor(diff / plant.days);
  const candidate = base + cycles * plant.days;
  return candidate >= TODAY ? candidate : candidate + plant.days;
}

// ── Fertilizer scheduling ────────────────────────────────────────────────────
// Returns next worm castings date
function nextWormCastings(plant) {
  if (!plant.fertSchedule || plant.fertSchedule.wc === null) return null;

  // Handle special schedules
  if (plant.fertSchedule.wc === "spring") {
    // Ponytail palm — once in April each year
    const thisYear = dayToYMD(TODAY).y;
    const aprilDate = ymdToDay(thisYear, 4, 15);
    if (TODAY <= aprilDate) return aprilDate;
    return ymdToDay(thisYear + 1, 4, 15);
  }

  if (plant.fertSchedule.wc === "biannual") {
    // Snake plant — April and July
    const thisYear = dayToYMD(TODAY).y;
    const april = ymdToDay(thisYear, 4, 15);
    const july = ymdToDay(thisYear, 7, 15);
    if (TODAY <= april) return april;
    if (TODAY <= july) return july;
    return ymdToDay(thisYear + 1, 4, 15);
  }

  // Regular interval (days)
  const interval = plant.fertSchedule.wc;

  // Check if plant was treated today
  const wasTreatedToday = WC_APPLIED_TODAY.includes(plant.name) && TODAY >= WORM_CASTINGS_TODAY;
  const baseline = wasTreatedToday ? WORM_CASTINGS_TODAY : ymdToDay(2026, 4, 1); // Default start of growing season

  // Only during growing season (roughly April–September for most)
  const next = baseline + interval;

  // If we're past September, push to next April
  const nextYMD = dayToYMD(next);
  if (nextYMD.m > 9) {
    return ymdToDay(nextYMD.y + 1, 4, 1);
  }
  return next;
}

function nextBananaWater(plant) {
  if (!plant.fertSchedule || plant.fertSchedule.bw === null) return null;
  const interval = plant.fertSchedule.bw;

  // For flowering-dependent plants, only schedule if currently flowering
  // Basil and Pothos get it year-round/growing season
  if (plant.fertSchedule.bwSeason === "blooming") {
    // Strawberry is currently flowering, everyone else TBD
    if (plant.name === "Albion Strawberry") {
      return ymdToDay(2026, 4, 30); // Next application ~1 week out
    }
    return null; // Not currently applicable
  }

  // Growing season plants
  return ymdToDay(2026, 5, 1); // Start of May
}

function wasWormCastingsToday(plantName) {
  return WC_APPLIED_TODAY.includes(plantName);
}

            <span style={{ fontSize: 12, fontFamily: "monospace", color: C.muted, letterSpacing: "0.06em" }}>
              {MONTHS[fws.m-1]} {fws.d} – {MONTHS[fwe.m-1]} {fwe.d}
            </span>
            <button onClick={() => setFertWeekOffset(o => o + 1)} style={{
              background: "none", border: `1px solid ${C.sageLight}`,
              color: C.moss, width: 32, height: 32, borderRadius: "50%",
              cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center",
            }}>›</button>
          </div>

          {/* Day header row */}
          <div style={{ display: "flex", paddingLeft: 140 }}>
            {fertDays.map(n => {
              const dt = dayToYMD(n);
              const isT = n === TODAY;
              return (
                <div key={n} style={{
                  flex: 1, textAlign: "center",
                  fontSize: 10, fontFamily: "monospace",
                  letterSpacing: "0.08em", textTransform: "uppercase",
                  color: isT ? C.moss : C.muted,
                  fontWeight: isT ? 700 : 400,
                  paddingBottom: 6,
                }}>
                  <div>{WEEKDAYS_SHORT[dayToWeekday(n)]}</div>
                  {isT ? (
                    <div style={{
                      width: 20, height: 20, borderRadius: "50%",
                      background: C.moss, color: "white",
                      fontSize: 10, display: "inline-flex",
                      alignItems: "center", justifyContent: "center",
                      marginTop: 2,
                    }}>{dt.d}</div>
                  ) : (
                    <div style={{ fontSize: 10, marginTop: 2 }}>{dt.d}</div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Groups by watering method, same as Calendar */}
          {groups.map(group => {
            const groupPlants = PLANTS.filter(p =>
              p.method === group.method && p.fertSchedule &&
              (p.fertSchedule.wc !== null || p.fertSchedule.bw !== null)
            );
            if (groupPlants.length === 0) return null;
            return (
              <div key={group.method}>
                <div style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "10px 16px 4px",
                }}>
                  <span style={{
                    background: group.color, color: "white",
                    fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase",
                    fontFamily: "monospace", padding: "3px 10px", borderRadius: 20,
                    whiteSpace: "nowrap",
                  }}>{group.label}</span>
                  <div style={{ flex: 1, height: 1, background: C.rule }} />
                </div>

                {groupPlants.map(plant => (
                  <FertRow key={plant.name} plant={plant} days={fertDays} />
                ))}
              </div>
            );
          })}

          {/* Bone meal reminder at bottom */}
          <div style={{
            margin: "16px 16px 0",
            background: "rgba(196,113,74,0.08)",
            border: `1px solid rgba(196,113,74,0.25)`,
            borderRadius: 12,
            padding: "12px 14px",
          }}>
            <div style={{ fontSize: 10, fontFamily: "monospace", color: C.terracotta, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 6 }}>
              🦴 Bone meal reminders
            </div>
            <div style={{ fontSize: 11, color: C.ink, lineHeight: 1.5 }}>
              <b>Dahlias</b> — mix 60g into each planting hole when tubers go in the ground in May.<br/>
              <b>Lavender</b> — one handful (30g) in early spring, only feeding of the year.<br/>
              <b>Strawberry, Sunflower, Stocks</b> — already applied at planting.
            </div>
          </div>

          {/* Legend */}
          <div style={{ display: "flex", gap: 16, padding: "16px 16px 0", flexWrap: "wrap" }}>
            {[
              { color: C.moss, label: "🪱 Worm castings" },
              { color: C.amber, label: "🍌 Banana water" },
              { color: C.parchment, border: C.sageLight, label: "Upcoming" },
            ].map(item => (
              <div key={item.label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{
                  width: 12, height: 12, borderRadius: "50%",
                  background: item.color,
                  border: item.border ? `1.5px solid ${item.border}` : "none",
                }} />
                <span style={{ fontSize: 10, fontFamily: "monospace", color: C.muted, letterSpacing: "0.06em" }}>
                  {item.label}
                </span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* CARE TIPS TAB */}
      {tab === "tips" && (
        <div style={{ padding: 16 }}>
          <p style={{ fontSize: 11, fontFamily: "monospace", color: C.muted, marginBottom: 16, lineHeight: 1.6, letterSpacing: "0.03em" }}>
            The schedule is a guide — always confirm before watering by checking the soil and your plant's signals.
          </p>
          {groups.map(group => {
            const groupPlants = PLANTS.filter(p => p.method === group.method);
            return (
              <div key={group.method} style={{ marginBottom: 8 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                  <span style={{
                    background: group.color, color: "white",
                    fontSize: 9, letterSpacing: "0.14em", textTransform: "uppercase",
                    fontFamily: "monospace", padding: "3px 10px", borderRadius: 20,
                  }}>{group.label}</span>
                  <div style={{ flex: 1, height: 1, background: C.rule }} />
                </div>
                {groupPlants.map(plant => (
                  <div key={plant.name} style={{
                    background: "white",
                    border: `1px solid ${C.rule}`,
                    borderRadius: 12,
                    padding: "14px",
                    marginBottom: 10,
                    opacity: plant.dormant ? 0.5 : 1,
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                      <span style={{ fontSize: 22 }}>{plant.emoji}</span>
                      <div>
                        <div style={{ fontSize: 14, fontFamily: "Georgia, serif", color: C.ink }}>{plant.name}</div>
                        <div style={{ fontSize: 9, fontFamily: "monospace", color: C.muted, fontStyle: "italic" }}>{plant.latin}</div>
                      </div>
                    </div>

                    {/* Scales strip — water need & sun level */}
                    {(plant.waterNeed || plant.sunLevel) && (
                      <div style={{
                        display: "flex", gap: 8,
                        padding: "8px 10px",
                        background: group.color,
                        borderRadius: 8,
                        marginBottom: 8,
                        color: "white",
                      }}>
                        {plant.waterNeed && (
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 9, fontFamily: "monospace", letterSpacing: "0.1em", textTransform: "uppercase", opacity: 0.75, marginBottom: 2 }}>
                              💧 Water Need
                            </div>
                            <div style={{ fontSize: 13, letterSpacing: "0.15em" }}>
                              {"●".repeat(plant.waterNeed)}<span style={{ opacity: 0.35 }}>{"●".repeat(5 - plant.waterNeed)}</span>
                            </div>
                          </div>
                        )}
                        {plant.sunLevel && (
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 9, fontFamily: "monospace", letterSpacing: "0.1em", textTransform: "uppercase", opacity: 0.75, marginBottom: 2 }}>
                              ☀️ Sun Level
                            </div>
                            <div style={{ fontSize: 13, letterSpacing: "0.15em" }}>
                              {"●".repeat(plant.sunLevel)}<span style={{ opacity: 0.35 }}>{"●".repeat(5 - plant.sunLevel)}</span>
                            </div>
                          </div>
                        )}
                      </div>
                    )}

                    {[
                      { icon: "👆", label: "Soil Check",      text: plant.check },
                      { icon: "👁",  label: "Visual Signs",    text: plant.indicator },
                      { icon: "☀️",  label: "Sunlight",        text: `${plant.sun} — ${plant.sunDetail}` },
                      { icon: "💦",  label: "Humidity",        text: plant.humidity },
                      { icon: "🍂",  label: "Seasonal Notes",  text: plant.seasonal },
                      { icon: "✂️",  label: "Pruning",         text: plant.prune },
                      { icon: "🌱",  label: "Fertilize",       text: plant.fertFreq },
                      { icon: "🧴",  label: "Fertilizer Type", text: plant.fertType },
                      { icon: "📋",  label: "How to Feed",     text: plant.fertDetail },
                    ].map(({ icon, label, text }) => (
                      <div key={label} style={{
                        display: "flex", gap: 8, alignItems: "flex-start",
                        padding: "7px 10px",
                        background: C.parchment,
                        borderRadius: 8,
                        marginBottom: 5,
                      }}>
                        <span style={{ fontSize: 13, flexShrink: 0, marginTop: 1 }}>{icon}</span>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 9, fontFamily: "monospace", color: C.moss, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 2 }}>{label}</div>
                          <div style={{ fontSize: 11, color: C.ink, lineHeight: 1.55 }}>{text}</div>
                        </div>
                      </div>
                    ))}

                    {/* Pro Tip callout */}
                    {plant.proTip && (
                      <div style={{
                        display: "flex", gap: 8, alignItems: "flex-start",
                        padding: "9px 11px",
                        background: "rgba(107,158,111,0.12)",
                        border: `1px solid rgba(107,158,111,0.3)`,
                        borderRadius: 8,
                        marginTop: 7,
                      }}>
                        <span style={{ fontSize: 14, flexShrink: 0, marginTop: 1 }}>💡</span>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 9, fontFamily: "monospace", color: C.moss, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 2, fontWeight: 600 }}>Pro Tip</div>
                          <div style={{ fontSize: 11, color: C.ink, lineHeight: 1.55, fontStyle: "italic" }}>{plant.proTip}</div>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function PlantRow({ plant, days, groupColor }) {
  return (
    <div style={{
      display: "flex",
      alignItems: "center",
      borderTop: `1px solid ${C.rule}`,
      minHeight: 44,
      opacity: plant.dormant ? 0.4 : 1,
    }}>
      <div style={{ width: 140, minWidth: 140, paddingLeft: 16, paddingRight: 8 }}>
        <div style={{ fontSize: 11, color: C.ink, lineHeight: 1.2, fontFamily: "Georgia, serif" }}>
          {plant.emoji} {plant.name}
        </div>
        <div style={{ fontSize: 9, color: C.muted, fontFamily: "monospace", marginTop: 1 }}>
          {plant.dormant ? "Awaiting sprouts" : plant.days === 1 ? "Daily" : `Every ${plant.days}d`}
        </div>
      </div>

      {days.map(n => {
        const isPast = n < TODAY;
        const isToday = n === TODAY;
        const water = isWaterDay(plant, n);
        const base = plant.lastWatered != null ? plant.lastWatered : LAST_WATERED;
        const isLW = n === base;

        let barColor = "#a8c9a8";
        let barPct = 0;
        if (!plant.dormant && !isPast) {
          const pos = ((n - base) % plant.days + plant.days) % plant.days;
          barPct = Math.round((1 - pos / plant.days) * 100);
          const daysLeft = plant.days - pos;
          barColor = daysLeft <= 1 ? C.terracotta : daysLeft <= 2 ? C.gold : C.sageLight;
        }

        let dotBg = "none", dotColor = "transparent", dotText = "";
        if (water || isLW) {
          if (isPast || isLW) { dotBg = C.moss; dotColor = "white"; dotText = "✓"; }
          else if (isToday) { dotBg = C.sage; dotColor = "white"; dotText = "💧"; }
          else { dotBg = C.parchment; dotColor = C.sage; dotText = "💧"; }
        }

        return (
          <div key={n} style={{
            flex: 1,
            height: 44,
            position: "relative",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            background: isToday ? "rgba(45,74,46,0.04)" : "transparent",
          }}>
            {!plant.dormant && !isPast && (
              <div style={{
                position: "absolute", left: 2, right: 2,
                top: "50%", transform: "translateY(-50%)",
                height: 6, borderRadius: 3,
                background: "#e8e0d0", overflow: "hidden",
              }}>
                <div style={{
                  height: "100%", width: `${barPct}%`,
                  background: barColor, opacity: 0.6,
                  borderRadius: 3,
                }} />
              </div>
            )}

            {dotText && (
              <div style={{
                position: "absolute",
                width: 22, height: 22,
                borderRadius: "50%",
                background: dotBg,
                border: dotBg === C.parchment ? `1.5px solid ${C.sageLight}` : "none",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: dotText === "✓" ? 10 : 11,
                color: dotColor,
                boxShadow: isToday && dotText === "💧" ? `0 2px 8px rgba(107,158,111,0.5)` : "none",
                opacity: isPast ? 0.7 : 1,
              }}>
                {dotText}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function FertRow({ plant, days }) {
  // Figure out the next upcoming fert day (for progress bar)
  const nextFert = nextFertDay(plant);

  // Determine "last fert day" — used as the origin for the progress bar.
  // For worm castings applied today, that's WORM_CASTINGS_TODAY.
  // Otherwise use TODAY as a reasonable origin so the bar fills as the next fert approaches.
  let lastFertOrigin = TODAY;
  if (WC_APPLIED_TODAY.includes(plant.name)) {
    lastFertOrigin = WORM_CASTINGS_TODAY;
  }

  return (
    <div style={{
      display: "flex",
      alignItems: "center",
      borderTop: `1px solid ${C.rule}`,
      minHeight: 44,
      opacity: plant.dormant ? 0.4 : 1,
    }}>
      <div style={{ width: 140, minWidth: 140, paddingLeft: 16, paddingRight: 8 }}>
        <div style={{ fontSize: 11, color: C.ink, lineHeight: 1.2, fontFamily: "Georgia, serif" }}>
          {plant.emoji} {plant.name}
        </div>
        <div style={{ fontSize: 9, color: C.muted, fontFamily: "monospace", marginTop: 1 }}>
          {plant.fertType.replace(/^[^\w]+/, "")}
        </div>
      </div>

      {days.map(n => {
        const isPast = n < TODAY;
        const isToday = n === TODAY;
        const { wc, bw } = fertTypesOnDay(plant, n);
        const isAppliedToday = isToday && WC_APPLIED_TODAY.includes(plant.name);

        // Progress bar: how close we are to nextFert from lastFertOrigin
        let barColor = C.sageLight;
        let barPct = 0;
        if (nextFert !== null && !isPast && !plant.dormant) {
          const total = nextFert - lastFertOrigin;
          if (total > 0) {
            const elapsed = n - lastFertOrigin;
            const ratio = Math.max(0, Math.min(1, elapsed / total));
            barPct = Math.round(ratio * 100);
            const daysLeft = nextFert - n;
            barColor = daysLeft <= 2 ? C.terracotta : daysLeft <= 5 ? C.gold : C.sageLight;
          }
        }

        // Decide what dot(s) to show on this day
        let dotBg = "none", dotColor = "transparent", dotText = "";
        if (isAppliedToday) {
          dotBg = C.moss; dotColor = "white"; dotText = "✓";
        } else if (wc && bw) {
          // Both — show a combined pill
          dotBg = C.moss; dotColor = "white"; dotText = "🪱🍌";
        } else if (wc) {
          if (isPast) { dotBg = C.moss; dotColor = "white"; dotText = "✓"; }
          else if (isToday) { dotBg = C.moss; dotColor = "white"; dotText = "🪱"; }
          else { dotBg = C.parchment; dotColor = C.moss; dotText = "🪱"; }
        } else if (bw) {
          if (isPast) { dotBg = C.amber; dotColor = "white"; dotText = "✓"; }
          else if (isToday) { dotBg = C.amber; dotColor = "white"; dotText = "🍌"; }
          else { dotBg = C.parchment; dotColor = C.amber; dotText = "🍌"; }
        }

        return (
          <div key={n} style={{
            flex: 1,
            height: 44,
            position: "relative",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            background: isToday ? "rgba(45,74,46,0.04)" : "transparent",
          }}>
            {!plant.dormant && !isPast && nextFert !== null && (
              <div style={{
                position: "absolute", left: 2, right: 2,
                top: "50%", transform: "translateY(-50%)",
                height: 6, borderRadius: 3,
                background: "#e8e0d0", overflow: "hidden",
              }}>
                <div style={{
                  height: "100%", width: `${barPct}%`,
                  background: barColor, opacity: 0.6,
                  borderRadius: 3,
                }} />
              </div>
            )}

            {dotText && (
              <div style={{
                position: "absolute",
                minWidth: 22, height: 22,
                padding: dotText.length > 2 ? "0 5px" : 0,
                borderRadius: 11,
                background: dotBg,
                border: dotBg === C.parchment ? `1.5px solid ${C.sageLight}` : "none",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: dotText === "✓" ? 10 : 10,
                color: dotColor,
                boxShadow: isToday && dotText !== "✓" ? `0 2px 8px rgba(107,158,111,0.4)` : "none",
                opacity: isPast ? 0.7 : 1,
              }}>
                {dotText}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
